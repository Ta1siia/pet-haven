<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Haven</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link
      rel="preload"
      as="image"
      href="./img/hero-bg-mobile.webp"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="./img/hero-bg-tablet.webp"
      media="(min-width: 768px) and (max-width: 1439px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="./img/hero-bg-desktop.webp"
      media="(min-width: 1440px)"
      fetchpriority="high"
    />
  </head>
  <body>
    <load src="./partials/header.html" />
    <main>
      <load src="./partials/hero.html" />
      <load src="./partials/pets-list.html" />
      <load src="./partials/about-us.html" />
      <load src="./partials/faq.html" />
      <load src="./partials/success-stories.html" />
    </main>
    <load src="./partials/footer.html" />
    <load src="./partials/animal-details-modal.html" />
    <load src="./partials/order-modal.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
