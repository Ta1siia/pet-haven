<section class="success-stories" id="success-stories">
  <div class="success-stories-container container">
    <div class="success-stories-title-wrapper">
      <h2 class="success-stories-title">Щасливі історії, що надихають</h2>
      <p class="success-stories-text">
        Ці хвостики вже знайшли свій дім. Ваш майбутній друг теж чекає на вас
      </p>
    </div>
    <div class="success-stories-swiper swiper">
      <ul class="success-stories-list swiper-wrapper"></ul>
    </div>
    <div class="success-stories-navigation">
      <div class="success-stories-pagination swiper-pagination"></div>

      <div class="success-stories-buttons">
        <button
          class="success-stories-button success-stories-button-prev"
          type="button"
          aria-label="Попередній відгук"
        >
          <svg
            class="success-stories-arrow success-stories-arrow-prev"
            width="24"
            height="24"
          >
            <use href="./img/icons.svg#icon-arrow_back"></use>
          </svg>
        </button>
        <button
          class="success-stories-button success-stories-button-next"
          type="button"
          aria-label="Наступний відгук"
        >
          <svg
            class="success-stories-arrow success-stories-arrow-next"
            width="24"
            height="24"
          >
            <use href="./img/icons.svg#icon-arrow_forward"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
